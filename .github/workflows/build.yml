name: Build and Release EXE

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'Downloaded_PDFs/**'
      - 'version.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = Get-Date -Format "yyyyMMdd-HHmm"
          "version=v$ver" >> $env:GITHUB_OUTPUT
          echo "VERSION=$ver"
          $short = Get-Date -Format "yyyyMMdd"
          "short_version=$short" >> $env:GITHUB_OUTPUT

      - name: Update version.json
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $ver = $ver -replace '^v',''
          $json = @{
            version = $ver
            app_name = "文献综合工具"
            download_url = "https://github.com/${{ github.repository }}/releases/latest/download/wenxian_gongju.exe"
            release_notes = "https://github.com/${{ github.repository }}/releases/latest"
          } | ConvertTo-Json
          [System.IO.File]::WriteAllText("${{ github.workspace }}\version.json", $json, [System.Text.UTF8Encoding]::new($false))

      - name: Inject version into source
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $ver = $ver -replace '^v',''
          $file = "${{ github.workspace }}\main.py"
          $content = [System.IO.File]::ReadAllText($file, [System.Text.UTF8Encoding]::new($false))
          $content = $content -replace 'CURRENT_VERSION\s*=\s*"[^"]*"', "CURRENT_VERSION = `"$ver`""
          [System.IO.File]::WriteAllText($file, $content, [System.Text.UTF8Encoding]::new($false))
          Write-Host "Version injected: $ver"

      - name: Build EXE
        shell: pwsh
        run: |
          $env:PYTHONUTF8 = 1
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          pyinstaller --onefile --console --name LiteratureTool --distpath dist --workpath build --specpath build main.py

      - name: Rename EXE
        shell: pwsh
        run: |
          Rename-Item -Path "dist\LiteratureTool.exe" -NewName "wenxian_gongju.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wenxian-tool
          path: dist/wenxian_gongju.exe
          retention-days: 7

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Auto Build

            **Build time**: ${{ github.event.head_commit.timestamp }}
            **Commit**: ${{ github.event.head_commit.message }}

            ### Download
            Click `wenxian_gongju.exe` below to download. No Python required.

            The app will auto-detect this update on next launch.
          files: dist/wenxian_gongju.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version.json
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: update version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push || echo "Push failed (may already be up to date)"
