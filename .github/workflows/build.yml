name: Build EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          cd 文献综合工具
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 openpyxl PyPDF2
          pip install pyinstaller

      - name: Build
        run: |
          cd 文献综合工具
          pyinstaller --onefile --windowed --name wenxian --distpath dist --workpath build main.py
          if exist dist\wenxian.exe (ren dist\wenxian.exe "文献综合工具.exe")

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: 文献综合工具/dist/文献综合工具.exe
