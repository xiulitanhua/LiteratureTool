name: Build EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        shell: pwsh
        run: |
          Set-Location 文献综合工具
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 openpyxl PyPDF2 pyinstaller
          Write-Host "=== Installed packages ==="
          pip list | Select-String "pandas|requests|PyPDF2|pyinstaller|beautifulsoup4|openpyxl"

      - name: Build
        shell: pwsh
        run: |
          Set-Location 文献综合工具
          Write-Host "Current dir: $(Get-Location)"
          Write-Host "Files: $(Get-ChildItem *.py | ForEach-Object { $_.Name })"
          pyinstaller --onefile --windowed --name app --distpath dist --workpath build --specpath build main.py
          if (Test-Path dist/app.exe) {
            Rename-Item dist/app.exe "文献综合工具.exe"
            Write-Host "=== Build success ==="
          } else {
            Write-Host "=== Build FAILED, listing dist ==="
            Get-ChildItem dist -Recurse
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: 文献综合工具/dist/文献综合工具.exe
