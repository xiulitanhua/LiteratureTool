name: Build EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: |
          pip install pandas requests beautifulsoup4 openpyxl PyPDF2 pyinstaller
          cd 文献综合工具
          pyinstaller --onefile --windowed --name app main.py
          ls dist/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: 文献综合工具/dist/
