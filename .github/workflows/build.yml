name: Build and Release EXE

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'Downloaded_PDFs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          $env:PYTHONUTF8 = 1
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          pyinstaller --onefile --console --name LiteratureTool --distpath dist --workpath build --specpath build main.py

      - name: Rename EXE
        shell: pwsh
        run: |
          Rename-Item -Path "dist\LiteratureTool.exe" -NewName "wenxian_gongju.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wenxian-tool
          path: dist/wenxian_gongju.exe
          retention-days: 7

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = Get-Date -Format "yyyyMMdd-HHmm"
          "version=v$ver" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Auto Build

            Build time: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.event.head_commit.message }}

            Download `wenxian_gongju.exe` to use. No Python required.
          files: dist/wenxian_gongju.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
